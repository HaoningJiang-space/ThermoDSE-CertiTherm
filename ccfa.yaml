  data_model: "CertiTherm/core.py"
  experiments: "CertiTherm/experiments.py"
  scale_study: "research/dr_dsc/"

claims:
  - id: "C0"
    status: "implemented_verified"
    text: >-
      Constraint generation reports a CERTIFIED plan distinctly from an
      uncertified working cover, and never presents the latter as an upper
      bound or a certificate.
    evidence:
      - "CertiTherm/synthesis.py: ObservationPlan.selected_action_ids vs candidate_action_ids"
      - "commit 4b9d14f (bug: budget exhaustion returned the empty-cut master's selection)"
      - "103/103 tests; measured 11-action cover of cost 31.0 previously reported as zero actions"

  - id: "C1"
    status: "implemented_verified"
    text: >-
      An anytime lower bound on the minimum-cost contract is certified by weak
      duality rather than trusted from the solver, so solver error can loosen
      it but never invalidate it.
    evidence:
      - "CertiTherm/synthesis.py::_anytime_lower_bound"
      - "commit 9427668"
      - "1000 random instances, costs 1e-3..1e3: 0 violations of LB <= integer optimum, 0 monotonicity violations"
    caveat: >-
      Empirically validated, NOT proved at the floating-point level. The
      deliberate downward deflation means a small positive gap can be reported
      where the true gap is zero.

  - id: "C2"
    status: "implemented_verified"
    text: >-
      A final exhaustive separation pass promotes the last cover to a certified
      plan when it holds, yielding a genuine upper bound and a real gap; the
      empty contract is a valid certified plan when the decision is already
      invariant.
    evidence:
      - "CertiTherm/synthesis.py: CERTIFIED_PLAN branch; commit a3b6e97"
      - "toy: max_iterations=1 -> CERTIFIED_PLAN, LB=0.999999999, UB=1.0, gap=1e-9; max_iterations>=2 -> OPTIMAL, gap=0.0"
      - "241-action instance: correctly does NOT promote at 60/250/1000 iterations"

  - id: "C3"
    status: "implemented_verified"
    text: >-
      Epistemic failures become progress-preserving UNRESOLVED while
      programming defects keep propagating, classified at the origin rather
      than by exception class at the API boundary.
    evidence:
      - "CertiTherm/synthesis.py: UnresolvedComputation, ContractViolation; commit 9c4a9bc"
      - "fault injection: 9 defect classes propagate; classified failures preserve iterations/witnesses/candidate"
      - "load-bearing detail: np.linalg.LinAlgError subclasses ValueError, so a boundary ValueError catch absorbed defect-origin singular-matrix failures"

  - id: "C4"
    status: "measured_synthetic_only"
    text: >-
      The default 8-worker separation configuration is a ~32x pessimization at
      this instance size: a fresh spawn-context pool is built per iteration to
      dispatch twelve ~5-6 ms LPs.
    evidence:
      - "sequential 1.59s/25 iters (0.064 s/iter) vs 8-worker 51.72s/25 iters (2.07 s/iter); ratio 32.5x"
      - "research/dr_dsc/profile_synthesis.py; commit 11d057a"
    caveat: >-
      Measured on the synthetic-operator instance only. The ~2 s/iteration
      overhead is an unseparated mixture of spawn, per-worker import, pickling,
      IPC and teardown and must not be attributed to any single one.

  - id: "C5"
    status: "measured_synthetic_only_not_generalizable"
    text: >-
      On a 241-action instance with a synthetic sharply-local thermal kernel,
      constraint generation does not close within 5000 sequential iterations,
      and the certified lower bound reaches 169.17 against a full-library cost
      of 1842 while still rising.
    evidence:
      - "sequential 5000 iters, 461s, UNRESOLVED, antichain 5840 cuts, exactly 2 collisions/iteration"
      - "bound sweep 16.0 / 21.0 / 31.325 / 169.167 at 60 / 250 / 1000 / 5000 iterations"
    caveat: >-
      The placed power vector and thermal operator are SYNTHETIC; only the
      floorplan and action registry are real. This says nothing about real
      HotSpot operators. Non-closure is shown, not explained -- a positive
      lower bound indicates intrinsic expense but does not exclude separation
      or heuristic quality as contributors.

  - id: "C6"
    status: "negative_retained"
    text: >-
      A differentiable proposal over the frozen action library (DR-DSC) does
      not beat plain cost-effectiveness greedy at realistic scale.
    evidence:
      - "241 actions, matched 60-round budget: learned 85.0 vs greedy 24.0, neither converged"
      - "research/dr_dsc/README.md; commit f23782f"
    caveat: >-
      Both runs unconverged, so this is not a comparison of final optima.
      Retained as a negative result per project policy. A known asymmetry
      favours greedy (adaptive gain recomputation vs a static learned order).

  - id: "C7"
    status: "blocked_on_dev_run"
    text: >-
      The behaviour above reproduces on real HotSpot operators rather than
      being an artifact of the synthetic kernel.
    evidence: []
    blocking: >-
      `CertiTherm.experiments --split dev` has been running ~5h on moe-server
      and is still building operators; no query results exist yet.

experiments:
  - id: "DEV"
    status: "in_progress"
    command: "python -m CertiTherm.experiments --split dev --output artifacts/dev-gpu"
    host: "moe-server"
    note: "authoritative for C7; do not interrupt"
  - id: "SCALE-SYNTH"
    status: "complete"
    command: "python -m research.dr_dsc.profile_synthesis / benchmark"
    note: "supports C4, C5, C6; synthetic operator"

