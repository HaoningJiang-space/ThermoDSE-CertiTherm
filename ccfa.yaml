open_risks:
  - "A GitHub PAT has appeared repeatedly in session transcripts. Source is a user-side goal template, not a repo file or hook config. Revocation is outstanding and cannot be performed from here."
  - "CERTIFIED_PLAN adds a fourth status value; peer review recommends orthogonal certification/optimality fields instead. Deferred until the dev run fixes the paper narrative."
  - "RESOLVED 2026-07-22: docs/INFORMATION_THEORETIC_METHOD.md claimed every local iteration queries the exact master. Corrected to describe greedy accumulation with exact closure on the collision-free branch. ccf-integrity-auditor confirmed exactness is preserved but only CONDITIONAL on _solve_master returning a true optimum and the separation oracle being sound and exhaustive; the unconditional phrasing was withdrawn."
  - "PARTIALLY RESOLVED 2026-07-22: an empty _collisions result is no longer indistinguishable from an incomplete search. Exhaustiveness is now a checked invariant -- the sequential path counts evaluated cells, the parallel path requires one result per dispatched cell, and an empty spec grid raises. A silently short result set now yields UNRESOLVED (verified: 3/6 results -> UNRESOLVED, not OPTIMAL). PARTIALLY ADDRESSED: _solve_master now verifies its own answer (selection covers every cut, objective agrees with that selection's cost, dual bound does not exceed the integer cost nor fall below the independently certified weak-duality bound). All five injected-failure cases are rejected."
  - "PARTIALLY ADDRESSED 2026-07-22: every certificate now records bound_provenance -- weak_duality (verifiable from the returned numbers alone: either an integral LP optimum with checked coverage, or a cost meeting the certified weak-duality bound) versus solver_branch_and_bound (closed by the solver's asserted dual bound). Query-level provenance takes the weakest across candidates. ccf-integrity-auditor notes this DISCLOSES rather than repairs the hole, and that reporting both under one OPTIMAL status is a semantic weakness -- it recommends orthogonal plan-validity and cost-optimality fields. Deferred, not resolved."
  - "AUDIT FOLLOW-UP 2026-07-22: the first lattice implementation was unsound outside the registered costs. _cost_lattice used Fraction.limit_denominator with a 1e-12 relative tolerance, so costs like 1.0000000000005 reconstructed as Fraction(1) and it returned g=1 although that cost is not a multiple of 1 -- the lifted bound would have been invalid. Costs are now converted EXACTLY (a float is an exact dyadic rational, so Fraction(float) is lossless); only the dual guess may be approximated, since the bound holds for any y>=0. The counterexample now yields its true fine lattice, so lifting simply does nothing -- the safe failure direction. Non-binary cuts are rejected rather than silently mis-evaluated."
  - "LARGELY CLOSED 2026-07-22 by lattice rounding: every contract cost is a multiple of the cost lattice g (=1 for the registered 1/2/4/8), so a valid fractional bound L implies C* >= ceil(L/g)*g. On the triangle instance this lifts LP 1.5 to 2 and proves a cost-2 plan optimal WITHOUT the MIP solver, while the fabricated cost-3 plan gets only 2 <= C* <= 3 and is NOT certified. Verified: legitimate cost-2 -> weak_duality; fabricated cost-3 -> solver_branch_and_bound regardless of whether mip_dual_bound reports 2.0, 2.5 or 3.0. The earlier framing that LP-non-tightness implies non-self-certifiability was wrong -- integrality of the cost lattice was the missing step. The Lagrangian bound is now evaluated in exact Fraction arithmetic, removing the defensive float deflation."
  - "SUPERSEDED, kept for history: the master checks detect an INCONSISTENT solver answer but not a self-consistent wrong one. ccf-integrity-auditor counterexample: true optimum 2, LP relaxation 1.5, solver returns a feasible plan of cost 3 with mip_dual_bound 3 -- coverage, objective agreement and both bound comparisons all pass, and cost == bound would yield OPTIMAL at a suboptimal plan. Integer optimality therefore still rests on trusting HiGHS branch-and-bound whenever the LP relaxation is not tight. Closing it needs a certified B&B proof object (SciPy/HiGHS exposes none) or exhaustive enumeration."
