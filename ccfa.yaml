reference_sources:
  - path: "external workspace references-src/ (not distributed)"
    note: >-
      Read-only algorithm references (PySAT Hitman, RoundingSat, VeriPB, SCIP
      exact, PySCIPOpt lazy constraints, VIPR, cuPDLPx, PACE25 hitting-set).
    license_boundary: >-
      PACE25 hitting-set is GPL-3.0. Read its algorithm structure only --
      lower-bound computation, core minimisation, disjoint cores, restarts --
      and never copy code into this permissively licensed core. Any reuse from
      any of these must be recorded in vendor/ with source repo, commit, path,
      owner/license, reuse mode and semantic delta before it lands.

  - "FIXED 2026-07-22, introduced same day: the ordered-query failure path added the failing candidate's local bound twice (it is accumulated before the status is examined, then added again). The reported query lower bound could therefore EXCEED the true optimum -- an invalid bound, the one error class this contract exists to exclude. Caught by ccf-integrity-auditor before any result depended on it; pinned by a regression test asserting the bound never exceeds the full-library cost."

  - "IMPLEMENTED 2026-07-22: Anytime-DSOS runs under a single end-to-end budget and the driver sources every primary endpoint from that one result. Pre-push audit caught that the first attempt built U as min(width, dual, fixed) in the driver -- violating the freeze twice (separately budgeted runs; independent baselines substituted into U) -- while unit tests called the controller directly and therefore missed the wiring error. A regression now asserts that independent baselines cannot leak into U/L. Commit c830327 removed the fixed 0.2 split: width may use the current remaining budget to obtain a replayable upper contract, and exact proof search receives the actual remainder. RESIDUAL: the SIGALRM budget is cooperative rather than a preemptive process deadline."

  - "FIXED 2026-07-22: separation now defaults to sequential (CERTITHERM_LP_WORKERS=1), removing the spawn entirely. Semaphore errors went 5 -> 0 and the rehearsal proceeds. One change closes both a deadlock and a 32x pessimization. SUPERSEDED: under a SHORT budget the Anytime-DSOS controller deadlocked. Its SIGALRM fires while ProcessPoolExecutor is spawning workers, leaving `FileNotFoundError: SemLock._rebuild` and a hung run (5 errors, no progress). The 1800s dev run never hit this because the alarm never landed mid-spawn. Two independent fixes point the same way: (a) block the alarm across pool construction, or (b) drop the pool entirely for separation, which earlier profiling already showed is a 32x PESSIMIZATION at this instance size (0.064 s/iteration sequential versus 2.07 s/iteration with 8 workers). (b) is both simpler and faster. Until this is fixed the rehearsal cannot complete and the v2 schema is unverified."

  - "SUPERSEDED 2026-07-22 — an early 25s dev schema rehearsal populated no endpoints because the former fixed 0.2 split gave width only 5s. Commit c830327 removed that split. A clean non-claim dev rehearsal is required on the final v3 candidate to verify populated endpoints and the complete run receipt before the held-out guard may open."

  - "INCIDENT 2026-07-22 — heldout_v2 was OPENED out of protocol. A --frozen run executed ~52 min from a DIRTY worktree (baseline 89318c7 + diff 6e133bc8f22c93b2), and commits 47577e3 and bc96f23 changed the algorithm AFTER it started, so no result could be attributed to one method. It produced 12 captures and 10 operators but NO results.tsv, so nothing was concluded and nothing is retracted. Artifacts are retained on moe-server under external archive ID certitherm-INVALID-heldout-v2-20260722 with INCIDENT.md and the launch-time diff. method-freeze-v2.1 is now OPENED_INVALID / PILOT_ONLY: it must not be used for tuning or paper results. Claim-grade work needs a new method-freeze-v3 split with, at minimum, entirely new architectures. Root cause: I launched a held-out run while treating preregistration completeness as the only precondition, ignoring that a clean committed revision and a frozen algorithm are equally required."

open_risks:
  - "A GitHub PAT has appeared repeatedly in session transcripts. Source is a user-side goal template, not a repo file or hook config. Revocation is outstanding and cannot be performed from here."
  - "RESOLVED 2026-07-22: plan_validity and cost_optimality now report the two independent facts explicitly. The legacy four-value status remains only for API compatibility; claim tables use the orthogonal fields."
  - "RESOLVED 2026-07-22: docs/INFORMATION_THEORETIC_METHOD.md claimed every local iteration queries the exact master. Corrected to describe greedy accumulation with exact closure on the collision-free branch. ccf-integrity-auditor confirmed exactness is preserved but only CONDITIONAL on _solve_master returning a true optimum and the separation oracle being sound and exhaustive; the unconditional phrasing was withdrawn."
  - "PARTIALLY RESOLVED 2026-07-22: an empty _collisions result is no longer indistinguishable from an incomplete search. Exhaustiveness is now a checked invariant -- the sequential path counts evaluated cells, the parallel path requires one result per dispatched cell, and an empty spec grid raises. A silently short result set now yields UNRESOLVED (verified: 3/6 results -> UNRESOLVED, not OPTIMAL). PARTIALLY ADDRESSED: _solve_master now verifies its own answer (selection covers every cut, objective agrees with that selection's cost, dual bound does not exceed the integer cost nor fall below the independently certified weak-duality bound). All five injected-failure cases are rejected."
  - "RESOLVED FOR ANYTIME ENDPOINTS 2026-07-22: every certificate records bound_provenance, and plan_validity/cost_optimality expose solver-attested closure separately from self-verifiable closure. The Anytime interval never uses a solver-attested branch-and-bound endpoint: it falls back to the independently certified relaxation bound. Legacy exact-status output may still say OPTIMAL for a solver-attested result, but claim tables label its cost optimality PROVEN_SOLVER_ATTESTED rather than presenting it as proof-carrying."
  - "AUDIT FOLLOW-UP 2026-07-22: the first lattice implementation was unsound outside the registered costs. _cost_lattice used Fraction.limit_denominator with a 1e-12 relative tolerance, so costs like 1.0000000000005 reconstructed as Fraction(1) and it returned g=1 although that cost is not a multiple of 1 -- the lifted bound would have been invalid. Costs are now converted EXACTLY (a float is an exact dyadic rational, so Fraction(float) is lossless); only the dual guess may be approximated, since the bound holds for any y>=0. The counterexample now yields its true fine lattice, so lifting simply does nothing -- the safe failure direction. Non-binary cuts are rejected rather than silently mis-evaluated."
  - "LARGELY CLOSED 2026-07-22 by lattice rounding: every contract cost is a multiple of the cost lattice g (=1 for the registered 1/2/4/8), so a valid fractional bound L implies C* >= ceil(L/g)*g. On the triangle instance this lifts LP 1.5 to 2 and proves a cost-2 plan optimal WITHOUT the MIP solver, while the fabricated cost-3 plan gets only 2 <= C* <= 3 and is NOT certified. Verified: legitimate cost-2 -> weak_duality; fabricated cost-3 -> solver_branch_and_bound regardless of whether mip_dual_bound reports 2.0, 2.5 or 3.0. The earlier framing that LP-non-tightness implies non-self-certifiability was wrong -- integrality of the cost lattice was the missing step. The Lagrangian bound is now evaluated in exact Fraction arithmetic, removing the defensive float deflation."
  - "SUPERSEDED, kept for history: the master checks detect an INCONSISTENT solver answer but not a self-consistent wrong one. ccf-integrity-auditor counterexample: true optimum 2, LP relaxation 1.5, solver returns a feasible plan of cost 3 with mip_dual_bound 3 -- coverage, objective agreement and both bound comparisons all pass, and cost == bound would yield OPTIMAL at a suboptimal plan. Integer optimality therefore still rests on trusting HiGHS branch-and-bound whenever the LP relaxation is not tight. Closing it needs a certified B&B proof object (SciPy/HiGHS exposes none) or exhaustive enumeration."
