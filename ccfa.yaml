# Why this file exists. A ccf-integrity-auditor pass on 2026-07-22 marked a
# large fraction of this project's claims "unsupported" -- not because the
# evidence was absent, but because it was scattered across a README, commit
# messages and remote log files with no central index tying claim to artifact.
# Sibling repos (ChipletThermalEnvelope, ChipletOrchestrationRegret,
# CertifiedChipletPlacement) all carry this ledger; CertiTherm did not.
# That same audit also caught a fabricated number here (see revision_ledger).

